<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar — Coworking Odontológico</title>
  <meta name="theme-color" content="#1f6feb">
  <link rel="manifest" href="../../manifest.webmanifest">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <script src="../../assets/js/brand.js" defer></script>
</head>
<body data-no-wpp>
  <header class="topbar">
    <div class="container"><a class="marca" href="../index.html">Coworking <span>Odontológico</span></a></div>
  </header>

  <main class="container container-sm" style="padding:40px 16px">
    <div class="card stack">
      <div>
        <h1>Área do profissional</h1>
        <p class="muted">Entre para reservar consultórios e gerenciar sua agenda.</p>
      </div>

      <div id="aviso" class="aviso aviso-atencao" style="display:none"></div>

      <form id="form-login" class="stack" autocomplete="on">
        <div class="campo">
          <label for="email">E-mail</label>
          <input id="email" type="email" required placeholder="voce@exemplo.com" autocomplete="username">
        </div>
        <div class="campo">
          <label for="senha">Senha</label>
          <input id="senha" type="password" required placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn btn-primario btn-bloco" type="submit" id="btn-entrar">Entrar</button>
      </form>

      <div class="row-between">
        <a href="cadastro.html" id="link-cadastro">Criar cadastro</a>
        <a href="#" id="link-recuperar" class="muted">Esqueci a senha</a>
      </div>
    </div>

    <p class="muted" style="text-align:center;margin-top:16px;font-size:.85rem">
      Novo cadastro passa por aprovação da gestão (envio de RG, carteirinha do conselho e comprovante).
    </p>
  </main>

  <script src="../../config/config.js" onerror="console.warn('config.js ausente — modo demonstração')"></script>
  <script src="../../assets/vendor/supabase.js"></script>
  <script src="../../assets/js/db.js"></script>
  <script>
    (function () {
      var aviso = document.getElementById("aviso");
      function mostrar(msg, tipo) {
        aviso.textContent = msg;
        aviso.className = "aviso " + (tipo === "ok" ? "aviso-info" : "aviso-atencao");
        aviso.style.display = "block";
      }
      var DB = window.EnjoyDB;

      if (!DB || !DB.pronto) {
        mostrar("Modo demonstração: banco ainda não configurado. Explore o app com dados de exemplo.");
      }

      // Se já está logado, pula direto pro destino certo.
      if (DB && DB.pronto) {
        DB.sessao().then(function (s) {
          if (s) return DB.perfilAtual().then(irParaApp);
        });
      }

      function irParaApp(perfil) {
        if (perfil && DB.ehGestao(perfil)) location.replace("gestao.html");
        else location.replace("index.html");
      }

      document.getElementById("form-login").addEventListener("submit", async function (e) {
        e.preventDefault();
        var email = document.getElementById("email").value.trim();
        var senha = document.getElementById("senha").value;
        var btn = document.getElementById("btn-entrar");

        if (!DB || !DB.pronto) { location.href = "index.html"; return; }

        btn.disabled = true; btn.textContent = "Entrando…";
        var r = await DB.client.auth.signInWithPassword({ email: email, password: senha });
        if (r.error) {
          btn.disabled = false; btn.textContent = "Entrar";
          var m = r.error.message || "";
          if (/invalid login credentials/i.test(m)) mostrar("E-mail ou senha incorretos.");
          else if (/email not confirmed/i.test(m)) mostrar("Confirme seu e-mail antes de entrar (verifique sua caixa de entrada).");
          else mostrar("Não foi possível entrar: " + m);
          return;
        }
        DB.limparCachePerfil();
        var perfil = await DB.perfilAtual(true);
        irParaApp(perfil);
      });

      document.getElementById("link-recuperar").addEventListener("click", async function (e) {
        e.preventDefault();
        if (!DB || !DB.pronto) { mostrar("Recuperação de senha disponível após a configuração do banco."); return; }
        var email = document.getElementById("email").value.trim();
        if (!email) { mostrar("Digite seu e-mail no campo acima e clique em “Esqueci a senha”."); return; }
        var r = await DB.client.auth.resetPasswordForEmail(email, { redirectTo: location.origin + location.pathname });
        if (r.error) mostrar("Não foi possível enviar: " + r.error.message);
        else mostrar("Enviamos um link de redefinição para " + email + ".", "ok");
      });
    })();
  </script>
</body>
</html>
